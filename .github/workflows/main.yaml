name: AstraLog CI/CD Pipeline

# This workflow is triggered automatically on every push to the 'main' branch.
on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    # The runner environment is the latest Ubuntu image provided by GitHub Actions.
    runs-on: ubuntu-latest
    # Define environment variables used across multiple steps.
    # Append the GitHub commit SHA to the directory name to create a unique working directory for every run, preventing data overwrite on the cluster.
    env:
      REMOTE_RUN_DIR: ${{ secrets.HPC_REMOTE_DIR }}/run-${{ github.sha }}

    steps:
      # Check out the repository code so the runner workspace can access it.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the specific Python environment required for the project.
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Upgrade pip and install the project dependencies listed in requirements.txt.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run the automated test suite using pytest to ensure code stability.
      # -v flag provides verbose output.
      - name: Run tests with pytest
        run: |
          python3 -m pytest -v
          
      # Install singularity in the GitHub Actions runner environment.
      - name: Set up apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6
          
      # Build the container image from its definition.
      - name: Build Singularity image
        run: |
          apptainer build app_container.sif app_container.def

      # Connect to the HPC cluster via SSH to prepare the environment.
      # Credentials are injected securely using GitHub Secrets.
      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HPC_HOST }}
          username: ${{ secrets.HPC_USER }}
          key: ${{ secrets.HPC_SSH_KEY }}
          port: ${{ secrets.HPC_PORT }}
          # Create unique run directory and input subdirectory.
          script: |
            mkdir -p "${{env.REMOTE_RUN_DIR}}/input"

      # Securely copy the built Singularity container (.sif) to the cluster.
      - name: Copy container to cluster
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HPC_HOST }}
          username: ${{ secrets.HPC_USER }}
          key: ${{ secrets.HPC_SSH_KEY }}
          port: ${{ secrets.HPC_PORT }}
          source: "app_container.sif"
          target: ${{ env.REMOTE_RUN_DIR }}

      # Securely copy the SLURM job submission script to the cluster.
      - name: Copy job script to cluster
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HPC_HOST }}
          username: ${{ secrets.HPC_USER }}
          key: ${{ secrets.HPC_SSH_KEY }}
          port: ${{ secrets.HPC_PORT }}
          source: "job.sh"
          target: ${{ env.REMOTE_RUN_DIR }}

      # Securely copy the necessary input files (rules and telemetry data) to the cluster.
      - name: Copy input files to cluster
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HPC_HOST }}
          username: ${{ secrets.HPC_USER }}
          key: ${{ secrets.HPC_SSH_KEY }}
          port: ${{ secrets.HPC_PORT }}
          source: "input/rules.json,input/telemetry_cleaned.csv"
          target: ${{ env.REMOTE_RUN_DIR }}

      # Connect to the HPC cluster via SSH one final time to submit the job.
      - name: Submit SLURM job on Galileo100
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HPC_HOST }}
          username: ${{ secrets.HPC_USER }}
          key: ${{ secrets.HPC_SSH_KEY }}
          port: ${{ secrets.HPC_PORT }}
          # Navigate to the run-specific directory, list the files to verify the transfer, submit the job.sh script to the SLURM workload manager.
          script: |
            cd "${{env.REMOTE_RUN_DIR}}"
            ls -R
            sbatch job.sh
