name: AstraLog CI Pipeline

# This workflow is triggered automatically on every push to the 'main' branch.
on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    # The runner environment is the latest Ubuntu image provided by GitHub Actions.
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code so the runner workspace can access it.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the specific Python environment required for the project.
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Upgrade pip and install the project dependencies listed in requirements.txt.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run the automated test suite using pytest to ensure code stability.
      # -v flag provides verbose output.
      - name: Run tests with pytest
        run: |
          python3 -m pytest -v
          
      # Install singularity in the runner environment.
      - name: Set up apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6
          
      # Build the container image from its definition.
      - name: Build Singularity image
        run: |
          apptainer build app_container.sif app_container.def
